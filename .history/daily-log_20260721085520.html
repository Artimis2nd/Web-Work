<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกงานประจำวัน | ระบบคิดค่าแรงคนงาน</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css">
<style>
    /* Loading Overlay Styles */
    #loading-overlay {
        position: fixed; /* ทำให้ลอยทับเนื้อหาอื่น */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(238, 241, 243, 0.9); /* --paper color with opacity */
        display: none; /* ซ่อนไว้เป็นค่าเริ่มต้น */
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 9999; /* ให้แสดงอยู่ชั้นบนสุดเสมอ */
    }

    #loading-overlay .spinner-dark {
        width: 40px;
        height: 40px;
        border-width: 4px;
        margin-bottom: 1rem;
        /* --- Added for animation --- */
        border-radius: 50%;
        border-style: solid;
        border-color: rgba(27,36,48,0.15);
        border-top-color: var(--blueprint);
        animation: spin 0.8s linear infinite;
    }

    #loading-overlay p {
        font-family: var(--font-body);
        font-weight: 600;
        color: var(--ink-soft);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading-overlay">
    <div class="spinner-dark"></div>
    <p>กำลังดึงรายการ รอสักครู่</p>
</div>
<div id="app-shell"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/pages/daily-log.js"></script>
</body>
</html>
