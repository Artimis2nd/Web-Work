<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกงานประจำวัน | ระบบคิดค่าแรงคนงาน</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css">
<style>
    /* Loading Overlay Styles */
    #loading-overlay {
        position: fixed; /* ทำให้ลอยทับเนื้อหาอื่น */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.85); /* พื้นหลังสีขาวโปร่งแสง */
        display: none; /* ซ่อนไว้เป็นค่าเริ่มต้น */
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 9999; /* ให้แสดงอยู่ชั้นบนสุดเสมอ */
        font-family: sans-serif;
        color: #333;
    }

    .spinner {
        border: 4px solid #f3f3f3; /* Light grey */
        border-top: 4px solid #3498db; /* Blue */
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>
<body>
<div id="loading-overlay">
    <div class="spinner"></div>
    <p>กำลังดึงข้อมูลใบงาน...</p>
</div>
<div id="app-shell"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/pages/daily-log.js"></script>
</body>
</html>
